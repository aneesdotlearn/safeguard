version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../devops/docker/backend.Dockerfile
      target: production
    container_name: safeguard_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - safeguard_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../devops/docker/frontend.Dockerfile
      target: production
    container_name: safeguard_frontend
    restart: unless-stopped
    networks:
      - safeguard_net

  redis:
    image: redis:7-alpine
    container_name: safeguard_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - safeguard_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.25-alpine
    container_name: safeguard_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./devops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./devops/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - safeguard_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  nginx_logs:

networks:
  safeguard_net:
    driver: bridge
